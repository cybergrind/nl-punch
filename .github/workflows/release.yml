name: Release

# Two ways to cut a release:
#
# 1. Push a semver tag (e.g. `git tag 0.2.0 && git push origin 0.2.0`).
#    The workflow uses the tag name verbatim as the release version.
#    The tag must be reachable from `main`.
#
# 2. Manual "Run workflow" from the GitHub UI with a `bump` input
#    (patch/minor/major). The workflow reads VERSION, bumps it,
#    commits the bump on the current branch, creates the tag, pushes,
#    then builds and releases.
#
# Both paths share the test → build → verify → publish pipeline below.

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver segment to bump"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  GO_VERSION_FILE: go.mod
  CMDS: "nl-punch nl-punch-signaling nl-punch-bench"
  TARGETS: "linux-amd64 linux-arm64 darwin-arm64"

jobs:
  # --------------------------------------------------------------------
  # Resolve which path we're on and produce `version` + `tag` outputs
  # that the rest of the pipeline consumes.
  # --------------------------------------------------------------------
  plan:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
      previous: ${{ steps.resolve.outputs.previous }}
      needs_bump: ${{ steps.resolve.outputs.needs_bump }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version from trigger
        id: resolve
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag push path: tag name is authoritative. Strip optional leading v.
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"

            # Enforce "on main branch" convention: the tagged commit must
            # be reachable from main. (`git branch --contains` lists local
            # branches; after a fresh clone we only have the default branch.)
            default_branch="${{ github.event.repository.default_branch }}"
            git fetch --no-tags origin "$default_branch"
            if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/${default_branch}"; then
              echo "::error::tag ${tag} is not reachable from origin/${default_branch}; push the tag only after the commit is on ${default_branch}"
              exit 1
            fi

            echo "tag=${tag}"             >> "$GITHUB_OUTPUT"
            echo "version=${version}"     >> "$GITHUB_OUTPUT"
            echo "previous="              >> "$GITHUB_OUTPUT"
            echo "needs_bump=false"       >> "$GITHUB_OUTPUT"
          else
            # Manual path: bump VERSION.
            previous=$(cat VERSION | tr -d '[:space:]')
            IFS='.' read -r maj min pat <<< "$previous"
            case "${{ inputs.bump }}" in
              major) maj=$((maj + 1)); min=0; pat=0 ;;
              minor) min=$((min + 1)); pat=0 ;;
              patch) pat=$((pat + 1)) ;;
            esac
            version="${maj}.${min}.${pat}"
            echo "tag=${version}"         >> "$GITHUB_OUTPUT"
            echo "version=${version}"     >> "$GITHUB_OUTPUT"
            echo "previous=${previous}"   >> "$GITHUB_OUTPUT"
            echo "needs_bump=true"        >> "$GITHUB_OUTPUT"
          fi

  # --------------------------------------------------------------------
  # Standard CI gate.
  # --------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true
      - run: go vet ./...
      - run: go test -timeout 120s ./...

  # --------------------------------------------------------------------
  # Cross-compile every (cmd × target) combination. One job per target.
  # --------------------------------------------------------------------
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true
      - name: Cross-compile
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.plan.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          for cmd in $CMDS; do
            out="dist/${cmd}-${GOOS}-${GOARCH}"
            go build -trimpath -ldflags '-s -w' -o "$out" "./cmd/${cmd}"
            test -s "$out" || { echo "::error::$out is empty"; exit 1; }
          done
          ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

  # --------------------------------------------------------------------
  # Pull all artifacts together and publish.
  # --------------------------------------------------------------------
  release:
    name: Publish ${{ needs.plan.outputs.tag }}
    runs-on: ubuntu-latest
    needs: [plan, build]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-staging
          pattern: dist-*
          merge-multiple: true

      - name: Verify artifacts
        run: |
          set -euo pipefail
          missing=0
          for tgt in $TARGETS; do
            for cmd in $CMDS; do
              path="dist-staging/${cmd}-${tgt}"
              if [ ! -s "$path" ]; then
                echo "::error::missing or empty artifact: $path"
                missing=$((missing + 1))
              else
                size=$(stat -c %s "$path" 2>/dev/null || stat -f %z "$path")
                echo "ok  $path  $size bytes"
              fi
            done
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::$missing artifact(s) missing"
            exit 1
          fi
          echo "all 9 expected artifacts present for ${{ needs.plan.outputs.tag }}"

      # Manual-dispatch path only: rewrite VERSION, commit, tag, push.
      # Tag-push path skips this — the tag already exists.
      - name: Commit version bump + tag (manual dispatch only)
        if: needs.plan.outputs.needs_bump == 'true'
        run: |
          set -euo pipefail
          echo "${{ needs.plan.outputs.version }}" > VERSION
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "release: ${{ needs.plan.outputs.version }}"
          git tag -a "${{ needs.plan.outputs.tag }}" -m "release ${{ needs.plan.outputs.tag }}"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "${{ needs.plan.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.plan.outputs.tag }}
          name: ${{ needs.plan.outputs.tag }}
          body: |
            Automated release ${{ needs.plan.outputs.tag }}.

            ${{ needs.plan.outputs.previous && format('Bumped `{0}` → `{1}`.', needs.plan.outputs.previous, needs.plan.outputs.version) || '' }}

            Artifacts: each of `nl-punch`, `nl-punch-signaling`, `nl-punch-bench` for `linux/amd64`, `linux/arm64`, `darwin/arm64`.
          files: dist-staging/*
          draft: false
          prerelease: false
